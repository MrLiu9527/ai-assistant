# 通过 SSH 将代码同步到 EC2 并在 deploy 目录执行 docker compose
# Secrets: EC2_HOST, EC2_USER, EC2_DEPLOY_PATH, SETTIMO_AI (SSH 私钥全文)
# 远端使用 sudo：EC2_USER 需对 sudo rsync / sudo docker 等配置 NOPASSWD（或交互式不可用）

name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SETTIMO_AI }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2_deploy
          chmod 600 ~/.ssh/ec2_deploy
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to EC2
        env:
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --rsync-path="sudo rsync" \
            -e "ssh -i $HOME/.ssh/ec2_deploy -o StrictHostKeyChecking=yes" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            --exclude 'frontend/node_modules' \
            --exclude '**/node_modules' \
            --exclude 'deploy/.env' \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${DEPLOY_PATH}/"

      - name: Build and restart stack
        env:
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          ssh -i "$HOME/.ssh/ec2_deploy" -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo bash -lc 'set -euo pipefail; cd ${DEPLOY_PATH}/deploy; chmod +x generate-env.sh docker-entrypoint.sh 2>/dev/null || true; ./generate-env.sh; docker compose up -d --build'"
